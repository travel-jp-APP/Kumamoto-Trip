        function renderNotesView() {
            if (!TRIP_DATA.notes || TRIP_DATA.notes.length === 0) {
                return `<div class="space-y-6 animate-fade-in pb-6"><h2 class="text-xl font-bold text-stone-800 px-1 flex items-center gap-2">${getIcon('notebook-pen', "text-pink-500", 24)}行程備註</h2><div class="text-center py-10 text-stone-500 bg-white/50 rounded-xl border border-stone-200">目前尚無備註資料</div></div>`;
            }
            
            const notesHtml = TRIP_DATA.notes.map(note => `
                <div class="bg-white/95 backdrop-blur-sm rounded-xl shadow-sm border border-stone-200 overflow-hidden mb-4">
                    <div class="p-4 border-b border-stone-100 bg-stone-50/50">
                        <h3 class="text-lg font-bold text-stone-800">${note.title}</h3>
                    </div>
                    ${note.image ? `<div class="p-4"><img src="${note.image}" alt="${note.title}" class="w-full h-auto rounded-lg shadow-sm border border-stone-200"></div>` : ''}

            `).join('');

            return `<div class="space-y-4 animate-fade-in pb-6"><h2 class="text-xl font-bold text-stone-800 px-1 flex items-center gap-2">${getIcon('notebook-pen', "text-pink-500", 24)}行程備註</h2>${notesHtml}</div>`;

        function renderFooter() {
            return `<div class="text-center pt-8 pb-4 opacity-80 mb-4"><div class="border-t border-stone-400/30 pt-2 px-4 inline-flex items-baseline gap-2"><span class="text-sm text-stone-500 font-medium tracking-wider">Created by</span><span class="text-4xl text-stone-600" style="font-family: 'Dancing Script', cursive">Wen</span></div></div>`;
        }

        let state = {
            activeTab: 'itinerary',
            selectedDayId: 'day1',
            guideTab: 'ios'
        };

        // 判斷是否從主畫面 (Standalone PWA Mode) 開啟
        function isStandaloneMode() {
            const isIOSStandalone = window.navigator.standalone === true;
            const isDisplayStandalone = window.matchMedia('(display-mode: standalone)').matches;
            const isAndroidApp = document.referrer.includes('android-app://');
            const urlParams = new URLSearchParams(window.location.search);
            const isPreviewOverride = urlParams.get('mode') === 'standalone' || urlParams.get('preview') === 'true';

            return isIOSStandalone || isDisplayStandalone || isAndroidApp || isPreviewOverride;
        }

        // 步驟引導分頁切換
        function switchGuideTab(tab) {
            state.guideTab = tab;
            renderGuideSteps();
        }

        function renderGuideSteps() {
            const steps = GUIDE_STEPS[state.guideTab] || GUIDE_STEPS.ios;
            const container = document.getElementById('guide-step-content');
            if (!container) return;

            container.innerHTML = steps.map(s => `
                <div class="flex items-start gap-3">
                    <span class="shrink-0 w-6 h-6 rounded-full bg-indigo-600 text-white font-bold text-xs flex items-center justify-center mt-0.5 shadow-sm">${s.num}</span>
                    <div class="text-stone-700 leading-relaxed flex-1">
                        ${s.text}
                    </div>
                </div>
            `).join('');

            const iosBtn = document.getElementById('btn-guide-ios');
            const androidBtn = document.getElementById('btn-guide-android');

            if (state.guideTab === 'ios') {
                iosBtn.className = "flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 transition-all duration-200 bg-white text-indigo-900 shadow-sm";
                androidBtn.className = "flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 transition-all duration-200 text-stone-500 hover:text-stone-800";
            } else {
                androidBtn.className = "flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 transition-all duration-200 bg-white text-indigo-900 shadow-sm";
                iosBtn.className = "flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold flex items-center justify-center gap-1.5 transition-all duration-200 text-stone-500 hover:text-stone-800";
            }

            if (window.lucide) lucide.createIcons();
        }

        // 隱藏版連續點擊 5 次頁尾可直接開啟（以便在電腦或非 PWA 瀏覽器中測試預覽）
        let secretClickCount = 0;
        let secretTimer = null;
        function handleSecretUnlock() {
            secretClickCount++;
            clearTimeout(secretTimer);
            secretTimer = setTimeout(() => { secretClickCount = 0; }, 2000);
            if (secretClickCount >= 5) {
                document.getElementById('pwa-guide-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                updateView();
            }
        }

        function updateView() {
            const mainContent = document.getElementById('main-content');
            const scrollerContainer = document.getElementById('date-scroller-container');
            const headerStatus = document.getElementById('header-status');

            mainContent.scrollTop = 0;
            let contentHtml = '';
            
            scrollerContainer.classList.add('hidden');
            headerStatus.classList.add('hidden');

            const views = {
                itinerary: () => { 
                    contentHtml = renderItineraryView(state.selectedDayId, false); 
                    scrollerContainer.classList.remove('hidden'); 
                    updateDateScroller(); 
                },
                backup: () => { 
                    contentHtml = renderItineraryView(state.selectedDayId, true); 
                    scrollerContainer.classList.remove('hidden'); 
                    updateDateScroller(); 
                },
                flights: () => contentHtml = renderFlightsView(),
                manhole: () => contentHtml = renderDriveView(),
                map: () => contentHtml = renderMapView(),
                notes: () => contentHtml = renderNotesView()
            };

            (views[state.activeTab] || views['itinerary'])();
            
            mainContent.innerHTML = contentHtml + renderFooter();
            updateBottomNav();
            lucide.createIcons();
        }

        function updateDateScroller() {
            const scroller = document.getElementById('date-scroller');
            scroller.innerHTML = TRIP_DATA.itinerary.map(day => {
                const isActive = state.selectedDayId === day.id;
                const activeClasses = isActive ? "bg-indigo-600/90 backdrop-blur border-indigo-600 text-white shadow-lg shadow-indigo-200" : "bg-white/60 backdrop-blur border-stone-200 text-stone-400";
                return `<button onclick="switchDay('${day.id}')" id="btn-${day.id}" class="flex-shrink-0 snap-center flex flex-col items-center justify-center w-14 h-16 rounded-xl border transition-all duration-300 active:scale-95 ${activeClasses}"><span class="text-[10px] font-medium uppercase leading-none mb-1">${day.date}</span><span class="text-lg font-black leading-none">${day.dayOfWeek}</span></button>`;
            }).join('');
            
            setTimeout(() => {
                const selectedBtn = document.getElementById(`btn-${state.selectedDayId}`);
                if (selectedBtn) selectedBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }, 50);
        }

        function updateBottomNav() {
            const nav = document.getElementById('bottom-nav');
            nav.innerHTML = NAV_TABS.map(tab => {
                const isActive = state.activeTab === tab.id;
                const color = (tab.color && isActive) ? tab.color : (isActive ? 'text-indigo-600' : 'text-stone-400');
                return `<button onclick="switchTab('${tab.id}')" class="flex flex-col items-center justify-center w-14 h-full space-y-1 active:bg-stone-50 transition-colors ${color}">${getIcon(tab.icon, "", 20)}<span class="text-[9px] font-medium">${tab.label}</span></button>`;
            }).join('');
        }

        function switchTab(tabId) { state.activeTab = tabId; updateView(); }
        function switchDay(dayId) { state.selectedDayId = dayId; updateView(); }

        document.addEventListener('gesturestart', function (event) {
            event.preventDefault();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const isStandalone = isStandaloneMode();

            if (isStandalone) {
                // Standalone PWA 模式開啟 -> 正常瀏覽行程
                document.getElementById('pwa-guide-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                updateView();
            } else {
                // 普通瀏覽器開啟 -> 顯示強制加入主畫面引導
                document.getElementById('app-container').classList.add('hidden');
                document.getElementById('pwa-guide-container').classList.remove('hidden');
                renderGuideSteps();
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
